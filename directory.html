  <link rel="stylesheet" href="/css/shared.css">
  <style>
    /* =====================================================
       Page-specific styles for directory.html.
       Tokens, reset, base typography, header chrome, and
       buttons (.btn-secondary, .btn-accent-outline) live in
       /css/shared.css.
    ===================================================== */

    /* Directory-only category tokens */
    :root {
      --cat-agent: #7AA2E8;
      --cat-skill: #6BC67E;
      --cat-pack: #A78BDB;
      --cat-resource: #D4C472;
    }

    /* Page header */
    .page-header { padding: 72px 0 32px; text-align: center; }
    .page-header h1 {
      font-size: 36px; font-weight: 700; line-height: 1.1;
      letter-spacing: -0.03em; margin-bottom: 12px;
    }
    .page-header p {
      color: var(--text-2); font-size: 17px; line-height: 1.7;
      max-width: 520px; margin: 0 auto;
    }

    /* Controls */
    .controls {
      display: flex; align-items: center; gap: 12px;
      padding: 28px 0 12px;
    }

    .search-input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px 10px 38px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      color: var(--text-1);
      outline: none;
      transition: border-color 0.15s ease;
      background-image: url("data:image/svg+xml,%3Csvg width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%239A9590' stroke-width='2' stroke-linecap='round' stroke-linejoin='round' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='11' cy='11' r='8'/%3E%3Cline x1='21' y1='21' x2='16.65' y2='16.65'/%3E%3C/svg%3E");
      background-repeat: no-repeat;
      background-position: 12px center;
    }
    .search-input::placeholder { color: var(--text-2); }
    .search-input:focus { border-color: var(--text-2); }

    .filter-pills { display: flex; gap: 6px; flex-shrink: 0; }

    .filter-pill {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 8px 14px;
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-2);
      cursor: pointer;
      transition: all 0.15s ease;
      white-space: nowrap;
    }
    .filter-pill:hover { color: var(--text-1); border-color: var(--text-2); }
    .filter-pill.active { color: var(--accent); border-color: var(--accent); background: rgba(232,122,90,0.12); }
    .filter-pill.active[data-filter="agent"] { color: var(--cat-agent); border-color: var(--cat-agent); background: rgba(122,162,232,0.12); }
    .filter-pill.active[data-filter="skill"] { color: var(--cat-skill); border-color: var(--cat-skill); background: rgba(107,198,126,0.12); }
    .filter-pill.active[data-filter="pack"] { color: var(--cat-pack); border-color: var(--cat-pack); background: rgba(167,139,219,0.12); }
    .filter-pill.active[data-filter="resource"] { color: var(--cat-resource); border-color: var(--cat-resource); background: rgba(212,196,114,0.12); }

    .results-count { padding: 0 0 20px; font-size: 13px; color: var(--text-2); }

    .dir-tag.active {
      color: var(--accent);
      border-color: var(--accent);
      background: var(--accent-glow);
    }

    /* Directory grid: 3 columns */
    .dir-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
      padding-bottom: 72px;
    }

    /* Card */
    .dir-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 22px;
      display: flex;
      flex-direction: column;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.15s ease;
    }
    .dir-card:hover { border-color: var(--text-2); }

    .dir-card-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .dir-card-name {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.01em;
      color: var(--text-1);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .dir-card:hover .dir-card-name { color: var(--accent); }

    .dir-card-type {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      border-radius: 100px;
      padding: 2px 7px;
      flex-shrink: 0;
    }
    .type-agent { color: var(--cat-agent); border: 1px solid rgba(122,162,232,0.4); }
    .type-skill { color: var(--cat-skill); border: 1px solid rgba(107,198,126,0.4); }
    .type-pack { color: var(--cat-pack); border: 1px solid rgba(167,139,219,0.4); }
    .type-resource { color: var(--cat-resource); border: 1px solid rgba(212,196,114,0.4); }

    .dir-card-author {
      font-size: 12px;
      color: var(--text-2);
      margin-bottom: 10px;
    }

    .dir-card-desc {
      font-size: 13px;
      line-height: 1.55;
      color: var(--text-2);
      flex: 1 1 auto;
      margin-bottom: 14px;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .dir-card-tags { display: flex; flex-wrap: wrap; gap: 5px; overflow: hidden; height: 50px; align-content: flex-start; }

    .dir-tag {
      font-size: 10px;
      font-weight: 500;
      color: var(--text-2);
      background: var(--elevated);
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 2px 8px;
      cursor: pointer;
      transition: all 0.15s ease;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .dir-tag:hover { color: var(--text-1); border-color: var(--text-2); }

    /* Empty state */
    .dir-empty {
      grid-column: 1 / -1;
      text-align: center;
      padding: 60px 0;
      color: var(--text-2);
      font-size: 15px;
    }

    /* CTA card */
    .dir-card-cta {
      border: 1px dashed var(--border);
      border-radius: 10px;
      padding: 22px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.15s ease;
      min-height: 220px;
      align-self: start;
    }
    .dir-card-cta:hover { border-color: var(--text-2); }
    .dir-card-cta-icon {
      width: 32px; height: 32px;
      color: var(--text-2);
      margin-bottom: 12px;
      transition: color 0.15s ease;
    }
    .dir-card-cta:hover .dir-card-cta-icon { color: var(--accent); }
    .dir-card-cta-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-1);
      margin-bottom: 4px;
    }
    .dir-card-cta-desc {
      font-size: 12px;
      color: var(--text-2);
      line-height: 1.5;
    }

    /* Footer */
    footer { border-top: 1px solid var(--border); padding: 40px 0; }
    .footer-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .footer-brand { font-size: 16px; font-weight: 700; color: var(--text-1); }
    .footer-links { display: flex; gap: 24px; }
    .footer-links a { color: var(--text-2); text-decoration: none; font-size: 14px; }
    .footer-links a:hover { color: var(--text-1); }
    .footer-credit { font-size: 13px; color: var(--text-2); }
    .footer-credit a { color: var(--text-2); text-decoration: underline; text-underline-offset: 2px; }
    .footer-credit a:hover { color: var(--text-1); }

    /* Responsive */
    @media (max-width: 1024px) {
      .dir-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }

    @media (max-width: 680px) {
      .page-header { padding: 52px 0 24px; }
      .page-header h1 { font-size: 28px; }
      .page-header p { font-size: 15px; }
      .controls { flex-direction: column; align-items: stretch; }
      .filter-pills { flex-wrap: wrap; }
      .dir-grid { grid-template-columns: 1fr; }
      .footer-top { flex-wrap: wrap; gap: 12px; }
    }
  </style>
</head>
<body>

  <header>
    <div class="container">
      <a href="/" class="logo">Rundock</a>

  <main class="container">

    <div class="controls">
      <input type="text" class="search-input" id="search" placeholder="Search by name, author, or tag...">

        <button class="filter-pill" data-filter="skill">Skills</button>
        <button class="filter-pill" data-filter="pack">Packs</button>

    </div>

    <div class="results-count" id="results-count"></div>
    <div class="dir-grid" id="dir-grid"></div>
  </main>

  <footer>
    <div class="container">
      <div class="footer-top">
        <span class="footer-brand">Rundock</span>

  {

    tags: ["agent-personas", "marketing", "agency"]

  {

    author: "obra",

    tags: ["composable-skills", "planning", "brainstorming"]

  {
    name: "AI Product Development OS",
    type: "pack",
    author: "akshatk7",
    repo: "https://github.com/akshatk7/ai-product-development-os",
    description: "A team knowledge base template with 11 self-improving skills and 4 agents. Strategy layer, project lifecycle, and integrations with Slack, Jira, Linear, and meeting tools.",
    tags: ["product-management", "team-knowledge", "self-improving"]
  }
];

const grid = document.getElementById('dir-grid');
const countEl = document.getElementById('results-count');
const searchInput = document.getElementById('search');
const filterBtns = document.querySelectorAll('.filter-pill');
let activeFilter = 'all';
let activeTag = null;

function tagLabel(slug) {
  return slug.replace(/-/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
}

function render() {
  const q = searchInput.value.toLowerCase().trim();
  let items = activeFilter === 'all' ? DIRECTORY : DIRECTORY.filter(d => d.type === activeFilter);
  if (q) {
    items = items.filter(d =>
      d.name.toLowerCase().includes(q) ||
      d.description.toLowerCase().includes(q) ||
      d.author.toLowerCase().includes(q) ||
      d.tags.some(t => t.includes(q))
    );
  }
  if (activeTag) {
    items = items.filter(d => d.tags.includes(activeTag));
  }

  countEl.textContent = items.length + (items.length === 1 ? ' result' : ' results');

  const ctaCard = `
    <a href="https://github.com/liamdarmody/rundock-site/issues/new?template=directory-submission.md" class="dir-card-cta" target="_blank" rel="noopener">
      <svg class="dir-card-cta-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
      <div class="dir-card-cta-title">Add yours</div>
      <div class="dir-card-cta-desc">Built an agent, skill, or pack for Claude Code? Submit it to the directory.</div>
    </a>
  `;

  if (!items.length) {
    grid.innerHTML = '<div class="dir-empty">No entries match your search.</div>' + ctaCard;
    return;
  }

  const cards = items.map(d => `
    <a href="${d.repo}" class="dir-card" target="_blank" rel="noopener">
      <div class="dir-card-header">
        <span class="dir-card-name">${d.name}</span>
        <span class="dir-card-type type-${d.type}">${d.type}</span>
      </div>
      <div class="dir-card-author">${d.author}</div>
      <div class="dir-card-desc">${d.description}</div>
      <div class="dir-card-tags">${d.tags.map(t => `<span class="dir-tag${t === activeTag ? ' active' : ''}" data-tag="${t}">${tagLabel(t)}</span>`).join('')}</div>
    </a>
  `).join('');

  grid.innerHTML = cards + ctaCard;
}

filterBtns.forEach(btn => {
  btn.addEventListener('click', () => {
    filterBtns.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    render();
  });
});

searchInput.addEventListener('input', render);

document.addEventListener('click', (e) => {
  const tag = e.target.closest('.dir-tag');
  if (tag) {
    e.preventDefault();
    e.stopPropagation();
    const clicked = tag.dataset.tag;
    activeTag = (activeTag === clicked) ? null : clicked;
    render();
  }
});

render();
</script>
</body>
</html>
